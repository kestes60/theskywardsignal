# Builds the Astro site and publishes it to GitHub Pages on every push to main.
# Uses the official withastro/action, which installs dependencies, runs the
# build, and uploads the output — no manual steps needed.
name: Deploy to GitHub Pages

on:
  # Run on every push to the main branch.
  push:
    branches: [main]
  # Allow running this workflow manually from the Actions tab.
  workflow_dispatch:

# Allow this job to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deploy at a time; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
